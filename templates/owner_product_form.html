{% extends "base.html" %}
{% block content %}
<h2 class="mb-3">{% if mode == 'edit' %}Edit{% else %}Add{% endif %} product</h2>
<div class="card">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Product name</label>
        <input class="form-control" type="text" name="name" value="{{ product.name if product else '' }}" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Price</label>
        <input class="form-control" type="text" name="price" value="{{ product.price if product else '' }}" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Stock available</label>
        <input class="form-control" type="number" name="stock" value="{{ product.stock if product else '' }}" required />
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit">Save</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('owner_dashboard') }}">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
